<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#1976d2" />
  <title>404 — BOTC Script Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(to bottom, #fdfbf7 0%, #f8f6f1 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }
    .code {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #6366f1 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #312e81;
    }
    p {
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    a {
      display: inline-block;
      background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s;
    }
    a:hover {
      background: linear-gradient(180deg, #4f46e5 0%, #4338ca 100%);
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    }
    .links {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      background: transparent;
      color: #4f46e5;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .links a:hover {
      background: rgba(99, 102, 241, 0.08);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. It may have been moved, renamed, or the URL might be mistyped.</p>
    <a href="/">Back to BOTC Script Tool</a>
    <div class="links">
      <a href="/#/repo">Script Repository</a>
    </div>
  </div>
</body>
</html>
