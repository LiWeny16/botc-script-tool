<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onion的钟楼工具 - 血染钟楼板子美化器与自定义剧本工具</title>
  <meta name="description" content="免费血染钟楼板子美化器和自定义剧本工具，支持导入官方 JSON、编辑角色与相克关系、特殊规则、双页排版，并导出 PDF、图片和多语言 JSON。" />
  <script>
    (function() {
      var supported = ["zh-CN","en","es"];
      var defaultLang = 'zh-CN';
      var browserLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      var matched = defaultLang;
      for (var i = 0; i < supported.length; i++) {
        if (browserLang === supported[i].toLowerCase()) {
          matched = supported[i];
          break;
        }
      }
      if (matched === defaultLang) {
        for (var i = 0; i < supported.length; i++) {
          if (browserLang.startsWith(supported[i].split('-')[0])) {
            matched = supported[i];
            break;
          }
        }
      }
      window.location.replace('/' + matched + '/');
    })();
  </script>
</head>

</body>
